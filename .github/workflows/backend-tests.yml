name: Backend tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      # Manim render smoke tests shell out to ffmpeg and link against cairo/pango.
      - name: Install system deps for Manim rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config

      - name: Install backend and dev deps
        run: pip install -e ".[dev]"

      # No AWS creds: every Bedrock call is mocked and integration tests are skip-marked.
      - name: Run tests
        run: pytest -q
